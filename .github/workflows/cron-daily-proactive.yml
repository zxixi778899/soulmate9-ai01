# Schedule: 0 8,14,20 * * *   (3x per day at 08:00 / 14:00 / 20:00 UTC)
name: cron-daily-proactive

on:
  schedule:
    - cron: '0 8,14,20 * * *'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # maxDuration=120 on the route, allow buffer
    steps:
      - name: Call /api/cron/daily-proactive
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL secret is not set"
            exit 1
          fi
          curl -fsS -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "User-Agent: github-actions/cron-daily-proactive" \
            "${APP_URL}/api/cron/daily-proactive" \
            -w '\nHTTP=%{http_code} TIME=%{time_total}s\n' \
            || (echo "::error::cron request failed"; exit 1)
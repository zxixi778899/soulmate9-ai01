name: Build RunPod Qwen3.5 9B GGUF Worker

on:
  workflow_dispatch:
  push:
    branches:
      - codex/runpod-qwen3-30b-worker
    paths:
      - infra/runpod/qwen35-9b-nsfw-gguf/**
      - .github/workflows/build-runpod-qwen35-9b-gguf.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/soulmate-qwen35-9b-nsfw-gguf
  IMAGE_TAG: q4km-llamacpp-b9445

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: infra/runpod/qwen35-9b-nsfw-gguf
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

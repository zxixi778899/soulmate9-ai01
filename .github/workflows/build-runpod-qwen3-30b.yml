name: Build RunPod Qwen3 30B Worker

on:
  workflow_dispatch:
  push:
    branches:
      - codex/runpod-qwen3-30b-worker
    paths:
      - infra/runpod/qwen3-30b-nsfw/**
      - .github/workflows/build-runpod-qwen3-30b.yml

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/soulmate-qwen3-30b-nsfw
  IMAGE_TAG: b207f2b-vllm0102

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: infra/runpod/qwen3-30b-nsfw
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
